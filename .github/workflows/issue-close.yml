name: Spec Checker

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const readme = fs.readFileSync("README.md", "utf8");
            const issue = context.payload.issue;

            const text = (
              issue.title + "\n" + issue.body
            ).toLowerCase();

            // READMEに書かれてる仕様ワード
            const specHints = [];

            if (readme.includes("cors")) {
              specHints.push("cors");
            }

            if (readme.includes("offline mode is not supported")) {
              specHints.push("offline");
            }

            const matched = specHints.some(word =>
              text.includes(word)
            );

            if (matched) {

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `
                README に記載されている既知仕様と一致したため、
                issue をクローズしました。
                `
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: "closed"
              });
            }
